name: Deploy Firebase Functions

on:
  push:
    branches: [claude/login-404-creator-5icq6j]
    paths:
      - 'functions/**'
      - 'firebase.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package.json

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: cd functions && npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Store Gmail secrets in Secret Manager
        run: |
          printf "%s" "${{ secrets.GMAIL_USER }}" | firebase functions:secrets:set GMAIL_USER --project database-star-787e0 --force
          printf "%s" "${{ secrets.GMAIL_APP_PASSWORD }}" | firebase functions:secrets:set GMAIL_APP_PASSWORD --project database-star-787e0 --force

      - name: Deploy functions
        run: firebase deploy --only functions --project database-star-787e0
