name: Deploy Firebase Functions

on:
  push:
    branches: [claude/login-404-creator-5icq6j]
    paths:
      - 'functions/**'
      - 'firebase.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package.json

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: cd functions && npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Write environment file
        run: |
          printf "BREVO_API_KEY=%s\n" "${{ secrets.BREVO_API_KEY }}" > functions/.env
          # Firebase CLI honours .gitignore when zipping functions — remove the exclusion
          # so the .env file is included in the deployment package (this runner is ephemeral)
          sed -i '/^functions\/\.env/d' .gitignore

      - name: Deploy functions
        run: firebase deploy --only functions --project database-star-787e0 --force
