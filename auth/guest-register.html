<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guest Access — United Republic of Stars</title>
<script src="../republicstar-auth.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Rajdhani:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Rajdhani:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"></noscript>
<style>
  :root{--black:#0a0a0a;--white:#ffffff;--red:#c8102e;--font-head:'Oswald',sans-serif;--font-sub:'Inter',sans-serif;--font-body:'Inter',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--white);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .wrap{text-align:center;padding:2rem;}
  .spinner{width:48px;height:48px;border:3px solid rgba(200,16,46,0.2);border-top-color:#c8102e;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1.8rem;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .label{font-family:var(--font-sub);font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:#c8102e;margin-bottom:0.5rem;}
  .title{font-family:var(--font-head);font-size:1.4rem;font-weight:600;letter-spacing:0.04em;color:rgba(255,255,255,0.85);}
  .sub{font-size:0.8rem;color:rgba(255,255,255,0.3);margin-top:0.5rem;}
</style>

  <!-- Open Graph / Discord -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://republica3334.github.io/sito/auth/guest-register.html">
  <meta property="og:site_name"   content="United Republic of Stars">
  <meta property="og:title"       content="Guest Access — United Republic of Stars">
  <meta property="og:description" content="The official citizen portal of the United Republic of Stars. Access public services, legislation, and government communications.">
  <meta property="og:image"       content="https://republica3334.github.io/sito/svgs/icone/preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="theme-color"        content="#c8102e">
  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Guest Access — United Republic of Stars">
  <meta name="twitter:description" content="The official citizen portal of the United Republic of Stars. Access public services, legislation, and government communications.">
  <meta name="twitter:image"       content="https://republica3334.github.io/sito/svgs/icone/preview.png">
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <div class="label">Guest Access</div>
  <div class="title">Creating guest session…</div>
  <div class="sub">You will be redirected automatically</div>
</div>
<script>
(function(){
  if(republicstarSession.get()){
    window.location.replace('../GOVERN_1.HTM');
    return;
  }
  function saveAndRedirect() {
    if (!window.republicstarDB) { setTimeout(saveAndRedirect, 400); return; }
    republicstarDB.registerGuest().then(function(result){
      return republicstarDB.signInWithCustomToken(result.token, false).then(function(){
        republicstarSession.set(result.user.id, result.user.role || 'guest', 0);
      });
    }).catch(function(){
      document.querySelector('.title').textContent = 'Guest access unavailable';
    }).finally(function(){
      var dest=localStorage.getItem('republicstar_redirect')||'../GOVERN_1.HTM';
      localStorage.removeItem('republicstar_redirect');
      window.location.replace(dest);
    });
  }
  saveAndRedirect();
})();
</script>
</body>
</html>
