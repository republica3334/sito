﻿<!DOCTYPE html>
<html lang="en">
<head>
<script>
  if (!/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
    window.location.replace('admin.html');
  }
</script>
<script src="../republicstar-auth.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Admin Panel — United Republic of Stars</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a;
      --red: #c8102e;
      --white: #ffffff;
      --font-head: 'Oswald', sans-serif;
      --font-sub:  'Rajdhani', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    html, body { background: var(--black); color: var(--white); font-family: var(--font-body); overflow-x: hidden; }
    a, button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--black);
      border-bottom: 2px solid var(--red);
      padding: 0 1.2rem;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-brand { display: flex; align-items: center; gap: 0.7rem; }
    .emblem-svg { width: 34px; height: auto; flex-shrink: 0; filter: invert(1); opacity: 0.9; }
    .brand-text h1 {
      font-family: var(--font-head); font-size: 0.88rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--white); line-height: 1.1;
    }
    .brand-text span {
      font-family: var(--font-sub); font-size: 0.5rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--red); display: block;
    }
    .logout-btn {
      background: transparent; border: 1.5px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5); font-family: var(--font-sub); font-size: 0.6rem;
      letter-spacing: 0.14em; text-transform: uppercase; padding: 0.5rem 0.85rem; cursor: pointer;
    }
    .logout-btn:active { border-color: var(--red); color: var(--white); }

    /* ── PAGE TITLE ── */
    .page-title {
      background: #0f0f0f; border-bottom: 1px solid rgba(200,16,46,0.3);
      padding: 1rem 1.2rem;
    }
    .page-title .eyebrow {
      font-family: var(--font-sub); font-size: 0.55rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--red); margin-bottom: 0.2rem;
    }
    .page-title h2 {
      font-family: var(--font-head); font-size: 1.2rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--white);
    }

    /* ── STATS STRIP ── */
    .stats-strip {
      display: flex; gap: 0; overflow-x: auto; background: #0a0a0a;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      scrollbar-width: none;
    }
    .stats-strip::-webkit-scrollbar { display: none; }
    .stat-cell {
      flex: 0 0 auto; padding: 0.9rem 1.2rem;
      border-right: 1px solid rgba(255,255,255,0.06);
      min-width: 90px;
    }
    .stat-cell strong {
      display: block; font-family: var(--font-head); font-size: 1.5rem;
      font-weight: 700; color: var(--white); line-height: 1;
    }
    .stat-cell span {
      font-family: var(--font-sub); font-size: 0.5rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.3); margin-top: 0.15rem; display: block;
    }

    /* ── TABS ── */
    .tabs {
      display: flex; background: #080808;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky; top: 56px; z-index: 90;
    }
    .tab {
      flex: 1; padding: 0.85rem 0.5rem; text-align: center;
      font-family: var(--font-sub); font-size: 0.65rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
      background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer;
    }
    .tab.active { color: var(--white); border-bottom-color: var(--red); }

    /* ── PANELS ── */
    .panel { display: none; padding: 1.2rem; }
    .panel.active { display: block; }

    /* ── SEARCH ── */
    .search-input {
      width: 100%; background: #1a1a1a; border: 1.5px solid rgba(255,255,255,0.08);
      color: var(--white); font-family: var(--font-body); font-size: 0.85rem;
      padding: 0.75rem 1rem; outline: none; box-sizing: border-box; margin-bottom: 1rem;
    }
    .search-input:focus { border-color: var(--red); }

    /* ── CITIZEN CARDS ── */
    .citizen-card {
      background: #111; border-left: 3px solid transparent;
      padding: 1rem 1.1rem; margin-bottom: 1px;
    }
    .citizen-card.creator { border-left-color: rgba(200,16,46,0.5); }
    .citizen-card.mod     { border-left-color: rgba(126,91,255,0.5); }
    .citizen-name {
      font-family: var(--font-head); font-size: 0.95rem; font-weight: 600;
      color: var(--white); margin-bottom: 0.2rem;
    }
    .citizen-meta {
      font-family: var(--font-sub); font-size: 0.55rem; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3); margin-bottom: 0.7rem;
    }
    .citizen-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .action-btn {
      font-family: var(--font-sub); font-size: 0.55rem; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 0.45rem 0.75rem; cursor: pointer;
      border: none;
    }
    .action-btn.approve  { background: var(--red); color: var(--white); }
    .action-btn.suspend  { background: transparent; border: 1px solid rgba(255,100,0,0.5); color: rgba(255,150,0,0.9); }
    .action-btn.reinstate{ background: transparent; border: 1px solid rgba(0,180,80,0.5); color: rgba(0,200,80,0.9); }
    .action-btn.makemod  { background: transparent; border: 1px solid rgba(126,91,255,0.5); color: rgba(126,91,255,0.9); }
    .action-btn.revokemod{ background: transparent; border: 1px solid rgba(126,91,255,0.25); color: rgba(126,91,255,0.5); }
    .action-btn.delete   { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.35); }

    .badge-status, .badge-role, .badge-creator {
      display: inline-block; font-family: var(--font-sub); font-size: 0.5rem;
      letter-spacing: 0.12em; text-transform: uppercase; padding: 0.1rem 0.4rem;
      margin-right: 0.25rem; margin-bottom: 0.25rem;
    }
    .badge-status.approved  { color: #00b450; }
    .badge-status.pending   { color: #f5a623; }
    .badge-status.suspended { color: var(--red); }
    .badge-role   { color: #7e5bff; border: 1px solid rgba(126,91,255,0.35); }
    .badge-creator{ color: var(--red); border: 1px solid rgba(200,16,46,0.35); }
    .badge-protected { color: var(--red); border: 1px solid rgba(200,16,46,0.3); font-family: var(--font-sub); font-size: 0.5rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.1rem 0.4rem; display: inline-block; }

    /* ── LOG ── */
    .log-entry {
      padding: 0.65rem 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; gap: 0.8rem; align-items: baseline;
    }
    .log-time { font-family: var(--font-sub); font-size: 0.5rem; color: rgba(255,255,255,0.25); flex-shrink: 0; }
    .log-msg  { font-family: var(--font-body); font-size: 0.78rem; color: rgba(255,255,255,0.6); }

    .empty-state {
      text-align: center; padding: 2.5rem 0;
      font-family: var(--font-body); font-size: 0.82rem; color: rgba(255,255,255,0.2);
    }
    .section-eyebrow {
      font-family: var(--font-sub); font-size: 0.55rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--red); margin-bottom: 0.4rem; display: block;
    }
    .section-head {
      font-family: var(--font-head); font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--white); margin-bottom: 1rem;
    }

    /* ── FOOTER ── */
    footer {
      background: #080808; border-top: 1px solid rgba(255,255,255,0.06);
      padding: 1.2rem; text-align: center;
      font-family: var(--font-sub); font-size: 0.52rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.15);
    }
    footer a { color: rgba(255,255,255,0.2); text-decoration: none; margin: 0 0.5rem; }
  </style>
</head>
<body>

<script>republicstarSession.requireAdmin();</script>

<!-- HEADER -->
<header>
  <a href="../mobile.html" class="header-brand" style="text-decoration:none;">
    <img src="../svgs/icone/republica/2.svg" class="emblem-svg" alt="Emblem" onerror="this.style.display='none'">
    <div class="brand-text">
      <h1>Rep. of Stars</h1>
      <span>Admin Panel</span>
    </div>
  </a>
  <button class="logout-btn" onclick="republicstarSession.logout()">Logout</button>
</header>

<!-- PAGE TITLE -->
<div class="page-title">
  <div class="eyebrow">Supreme Authority</div>
  <h2>Administration Panel</h2>
</div>

<!-- STATS STRIP -->
<div class="stats-strip" id="statsStrip"></div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('pending',this)">Pending <span id="tabPendingCount"></span></button>
  <button class="tab" onclick="switchTab('citizens',this)">Citizens</button>
  <button class="tab" onclick="switchTab('log',this)">Log</button>
</div>

<!-- PANEL: PENDING -->
<div class="panel active" id="panel-pending">
  <span class="section-eyebrow">Action Required</span>
  <div class="section-head">Pending Approvals</div>
  <div id="pendingList"></div>
  <div id="noPending" class="empty-state" style="display:none;">No pending registrations.</div>
</div>

<!-- PANEL: CITIZENS -->
<div class="panel" id="panel-citizens">
  <input class="search-input" id="searchBox" type="text" placeholder="Search by name or ID…" oninput="renderAll()">
  <div id="citizenList"></div>
</div>

<!-- PANEL: LOG -->
<div class="panel" id="panel-log">
  <span class="section-eyebrow">System</span>
  <div class="section-head">Activity Log</div>
  <div id="activityLog"></div>
</div>

<!-- FOOTER -->
<footer>
  <span>© 2026 United Republic of Stars</span>
  <a href="admin.html">Desktop version →</a>
</footer>

<!-- COOKIE BANNER -->
<div id="cookieBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#0f0f0f;border-top:2px solid var(--red);z-index:9999;padding:1rem 1.2rem;">
  <p style="font-size:0.78rem;color:rgba(255,255,255,0.5);line-height:1.5;margin-bottom:0.7rem;">This portal uses only essential cookies. <a href="#" style="color:var(--red);">Privacy Policy</a></p>
  <div style="display:flex;gap:0.6rem;">
    <button onclick="setCookiePref('essential')" style="flex:1;padding:0.65rem;font-family:var(--font-sub);font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;border:1.5px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.6);">Essential</button>
    <button onclick="setCookiePref('all')" style="flex:1;padding:0.65rem;font-family:var(--font-sub);font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;background:var(--red);border:none;color:white;">Accept</button>
  </div>
</div>

<script>
var _users = [];

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function getLog(){ return JSON.parse(localStorage.getItem('republicstar_log')||'[]'); }
function addLog(msg){
  var log = getLog();
  log.unshift({msg: msg, time: new Date().toLocaleString()});
  if (log.length > 50) log.pop();
  localStorage.setItem('republicstar_log', JSON.stringify(log));
  renderLog();
}

function isCreator(id){ return id === 'ilcreatore'; }

function statusBadge(s){
  return '<span class="badge-status '+s+'">'+s+'</span>';
}

function renderStats(){
  var users = _users;
  var total = users.length;
  var pending = users.filter(function(u){ return u.status==='pending'; }).length;
  var approved = users.filter(function(u){ return u.status==='approved'; }).length;
  var suspended = users.filter(function(u){ return u.status==='suspended'; }).length;
  var mods = users.filter(function(u){ return u.role==='moderator'; }).length;
  document.getElementById('statsStrip').innerHTML =
    cell('Total', total) + cell('Approved', approved) + cell('Pending', pending) +
    cell('Suspended', suspended) + cell('Mods', mods);
  document.getElementById('tabPendingCount').textContent = pending ? '('+pending+')' : '';
}
function cell(label, val){
  return '<div class="stat-cell"><strong>'+val+'</strong><span>'+label+'</span></div>';
}

function renderPending(){
  var pending = _users.filter(function(u){ return u.status==='pending'; });
  var list = document.getElementById('pendingList');
  var none = document.getElementById('noPending');
  if (pending.length === 0){ list.innerHTML=''; none.style.display='block'; return; }
  none.style.display = 'none';
  list.innerHTML = pending.map(function(u){
    return '<div class="citizen-card">'
      + '<div class="citizen-name">'+( u.name||'—')+'</div>'
      + '<div class="citizen-meta">'+( u.id||'—')+' · '+(u.email||'—')+'</div>'
      + '<div class="citizen-actions">'
      + '<button class="action-btn approve" onclick="approveUser(\''+u.id+'\')">Approve</button>'
      + '<button class="action-btn delete"  onclick="rejectUser(\''+u.id+'\')">Reject</button>'
      + '</div>'
      + '</div>';
  }).join('');
}

function renderAll(){
  var q = (document.getElementById('searchBox').value||'').toLowerCase();
  var nonPending = _users.filter(function(u){ return u.status!=='pending'; });
  var filtered = q ? nonPending.filter(function(u){
    return (u.name||'').toLowerCase().includes(q)||(u.id||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q);
  }) : nonPending;
  var list = document.getElementById('citizenList');
  if (filtered.length===0){ list.innerHTML='<div class="empty-state">No citizens found.</div>'; return; }
  list.innerHTML = filtered.map(function(u){
    var creator = isCreator(u.id);
    var isMod = u.role === 'moderator';
    var cls = creator ? 'creator' : isMod ? 'mod' : '';
    var badges = statusBadge(u.status);
    if (creator) badges += '<span class="badge-creator">👑 Creator</span>';
    if (isMod && !creator) badges += '<span class="badge-role">Mod</span>';
    var actions = creator
      ? '<span class="badge-protected">Protected</span>'
      : '<div class="citizen-actions">'
        + (u.status!=='approved' ? '<button class="action-btn approve"   onclick="approveUser(\''+u.id+'\')">Approve</button>' : '')
        + (u.status!=='suspended'? '<button class="action-btn suspend"   onclick="suspendUser(\''+u.id+'\')">Suspend</button>' : '')
        + (u.status==='suspended' ? '<button class="action-btn reinstate" onclick="approveUser(\''+u.id+'\')">Reinstate</button>' : '')
        + (!isMod ? '<button class="action-btn makemod"  onclick="makeModUser(\''+u.id+'\')">Make Mod</button>'
                  : '<button class="action-btn revokemod" onclick="revokeModUser(\''+u.id+'\')">Revoke Mod</button>')
        + '<button class="action-btn delete"    onclick="deleteUser(\''+u.id+'\')">Delete</button>'
        + '</div>';
    return '<div class="citizen-card '+cls+'">'
      + '<div class="citizen-name">'+( u.name||'—')+'</div>'
      + '<div style="margin-bottom:0.4rem;">'+badges+'</div>'
      + '<div class="citizen-meta">'+( u.id||'—')+' · '+(u.email||'—')+'</div>'
      + actions
      + '</div>';
  }).join('');
}

function renderLog(){
  var log = getLog();
  var el = document.getElementById('activityLog');
  if (log.length===0){ el.innerHTML='<div class="empty-state">No activity recorded yet.</div>'; return; }
  el.innerHTML = log.slice(0,20).map(function(e){
    return '<div class="log-entry"><span class="log-time">'+e.time+'</span><span class="log-msg">'+e.msg+'</span></div>';
  }).join('');
}

function refresh(){ renderStats(); renderPending(); renderAll(); renderLog(); }

function approveUser(id){
  var u=_users.find(function(x){ return x.id===id; });
  if(!u) return;
  republicstarDB.updateUser(id,{status:'approved'}).then(function(){ addLog('Approved: '+(u.name||id)); }).catch(console.error);
}
function rejectUser(id){
  if(!confirm('Reject and delete this registration?')) return;
  var u=_users.find(function(x){ return x.id===id; });
  republicstarDB.deleteUser(id).then(function(){ addLog('Rejected: '+((u?u.name:'?')+' ('+id+')')); }).catch(console.error);
}
function deleteUser(id){
  if(isCreator(id)){alert('ilcreatore cannot be deleted.');return;}
  if(!confirm('Permanently delete this account?')) return;
  var u=_users.find(function(x){ return x.id===id; });
  republicstarDB.deleteUser(id).then(function(){ addLog('Deleted: '+((u?u.name:'?')+' ('+id+')')); }).catch(console.error);
}
function makeModUser(id){
  if(isCreator(id)){alert('ilcreatore is already Supreme Administrator.');return;}
  var u=_users.find(function(x){ return x.id===id; });
  republicstarDB.updateUser(id,{role:'moderator',status:'approved'}).then(function(){ addLog('Granted Mod: '+((u?u.name:'?')+' ('+id+')')); }).catch(console.error);
}
function revokeModUser(id){
  if(isCreator(id)){alert('Cannot revoke ilcreatore.');return;}
  var u=_users.find(function(x){ return x.id===id; });
  republicstarDB.updateUser(id,{role:'citizen'}).then(function(){ addLog('Revoked Mod: '+((u?u.name:'?')+' ('+id+')')); }).catch(console.error);
}
function suspendUser(id){
  if(isCreator(id)){alert('ilcreatore cannot be suspended.');return;}
  var u=_users.find(function(x){ return x.id===id; });
  republicstarDB.updateUser(id,{status:'suspended'}).then(function(){ addLog('Suspended: '+((u?u.name:'?')+' ('+id+')')); }).catch(console.error);
}

function _attachListener(){
  if(window.republicstarDB){
    republicstarDB.onUsers(function(users){ _users=users; refresh(); });
  } else {
    setTimeout(_attachListener, 400);
  }
}
_attachListener();
renderLog();
addLog('Admin session started');

document.addEventListener('DOMContentLoaded', function(){
  republicstarUpdateNav();
  republicstarCookieBanner();
});
</script>
</body>
</html>
